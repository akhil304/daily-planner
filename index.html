<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Planner</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:#f0f2f5;display:flex;flex-direction:column;height:100vh;overflow:hidden}
header{background:#fff;padding:8px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #e0e0e0;flex-shrink:0;gap:8px;flex-wrap:wrap}
header h1{font-size:16px;font-weight:700;color:#1a1a2e}
.nav-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.nav-btn{background:none;border:1px solid #ddd;border-radius:6px;padding:4px 10px;cursor:pointer;font-size:13px;color:#555}
.nav-btn:hover{background:#f5f5f5}
.sync-btn{border:none;border-radius:6px;padding:4px 10px;cursor:pointer;font-size:12px;font-weight:600;color:#fff}
#export-btn{background:#43a047}
#export-btn:hover{background:#2e7d32}
#import-btn{background:#5c6bc0}
#import-btn:hover{background:#3f51b5}
#date-label{font-size:14px;font-weight:600;color:#333;min-width:130px;text-align:center}
.main{display:flex;flex:1;overflow:hidden}
.cal-panel{flex:1;overflow-y:auto;border-right:1px solid #e0e0e0;background:#fff}
.hour-row{display:flex;align-items:stretch;border-bottom:1px solid #f0f0f0;min-height:52px}
.hour-label{width:52px;flex-shrink:0;font-size:14px;font-weight:600;color:#666;padding:6px 6px 0;text-align:right;user-select:none}
.hour-cell{flex:1;display:flex;flex-direction:row;align-items:stretch;padding:4px;gap:4px;transition:background .15s;position:relative;overflow:hidden;min-height:44px}
.hour-cell.drag-over{background:#e8eaf6;outline:2px dashed #5c6bc0}
.hour-cell:hover{background:#f8f9ff}
.task-chip{flex:1;min-width:0;border-radius:6px;display:flex;align-items:center;justify-content:center;overflow:hidden;cursor:pointer;position:relative;padding:4px 6px}
.task-chip span{font-size:11px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;text-align:center;line-height:1;display:block}
.task-chip:hover::after{content:'\u00d7';position:absolute;inset:0;background:rgba(0,0,0,.4);color:#fff;font-size:18px;font-weight:900;display:flex;align-items:center;justify-content:center}
.now-line{position:absolute;left:0;right:0;height:2px;background:#e53935;z-index:5;pointer-events:none}
.now-line::before{content:'';position:absolute;left:-4px;top:-4px;width:10px;height:10px;border-radius:50%;background:#e53935}
.right-panel{width:280px;flex-shrink:0;display:flex;flex-direction:column;background:#fafbfc;overflow:hidden}
.panel-section{flex:1;overflow-y:auto;padding:12px;min-height:0}
.panel-section+.panel-section{border-top:1px solid #e8e8e8}
.panel-title{font-size:12px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
.add-row{display:flex;gap:6px;margin-bottom:10px}
.add-row input{flex:1;padding:7px 10px;border:1px solid #ddd;border-radius:8px;font-size:14px;outline:none}
.add-row input:focus{border-color:#5c6bc0}
.add-row button{padding:7px 12px;background:#5c6bc0;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600}
.drag-hint{font-size:11px;color:#aaa;text-align:center;padding:4px 0 8px}
.task-card{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:10px;margin-bottom:6px;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.08);cursor:grab;user-select:none}
.task-card.dragging{opacity:.4}
.task-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.task-name{font-size:14px;color:#333;flex:1}
.task-del{background:none;border:none;cursor:pointer;color:#bbb;font-size:16px;padding:0 2px;line-height:1}
.task-del:hover{color:#e53935}
.rem-card{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:10px;margin-bottom:6px;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.08);cursor:pointer;user-select:none}
.rem-card:hover{background:#f0f4ff}
.rem-card.rem-set{background:#eef2ff}
.rem-icon{font-size:16px;flex-shrink:0}
.rem-label{flex:1;font-size:13px;color:#333;font-weight:500}
.rem-time{font-size:12px;color:#888;font-weight:600}
.rem-clear{background:none;border:none;cursor:pointer;color:#bbb;font-size:14px;padding:0 2px}
.rem-clear:hover{color:#e53935}
#toast{display:none;position:fixed;bottom:20px;right:20px;background:#323232;color:#fff;padding:10px 16px;border-radius:10px;font-size:14px;z-index:999;max-width:300px;word-break:break-all}
#toast-title{font-weight:700;margin-bottom:2px}
#toast-body{font-size:12px;opacity:.85}
</style>
</head>
<body>
<header>
  <h1>Daily Planner</h1>
  <div class="nav-row">
    <button class="nav-btn" id="prev">&#8249;</button>
    <span id="date-label"></span>
    <button class="nav-btn" id="next">&#8250;</button>
    <button class="nav-btn" id="today-btn">Today</button>
    <button class="sync-btn" id="export-btn">🔗 Copy Link</button>
    <button class="sync-btn" id="import-btn">📥 Import</button>
  </div>
</header>
<div class="main">
  <div class="cal-panel" id="cal-panel"></div>
  <div class="right-panel">
    <div class="panel-section">
      <div class="panel-title">Tasks</div>
      <div class="add-row">
        <input id="task-input" type="text" placeholder="Add task…">
        <button id="add-btn">+</button>
      </div>
      <div class="drag-hint">☰ Drag onto calendar</div>
      <div id="task-list"></div>
    </div>
    <div class="panel-section">
      <div class="panel-title">Reminders</div>
      <div id="rem-list"></div>
    </div>
  </div>
</div>
<div id="toast"><div id="toast-title"></div><div id="toast-body"></div></div>
<script>
const STORE_KEY='dp_v1';
const COLORS=['#5c6bc0','#43a047','#e53935','#fb8c00','#00acc1','#8e24aa','#f4511e','#00897b','#d81b60','#546e7a'];
const MAX_PER_SLOT=10;
const REMINDER_TASKS=[{id:'r1',name:'Morning standup'},{id:'r2',name:'Lunch break'},{id:'r3',name:'Team sync'},{id:'r4',name:'End of day review'}];
let ci=0;let cur=new Date();cur.setHours(0,0,0,0);
function checkUrlImport(){try{const p=new URLSearchParams(location.search);const d=p.get('d');if(!d)return null;const parsed=JSON.parse(atob(d));history.replaceState(null,'',location.pathname);return parsed;}catch(e){return null}}
function loadS(){const empty={tasks:[],slots:{},reminders:{},nextId:1};try{const imported=checkUrlImport();if(imported){localStorage.setItem(STORE_KEY,JSON.stringify(imported));setTimeout(()=>showToast('\u2705 Synced!','Data imported from your other device'),300);return imported;}const v1=localStorage.getItem(STORE_KEY);if(v1)return JSON.parse(v1);const leg=localStorage.getItem('dpState2')||localStorage.getItem('dpState');if(leg){const d=JSON.parse(leg);if(!d.reminders)d.reminders={};localStorage.setItem(STORE_KEY,JSON.stringify(d));return d;}}catch(e){}return empty;}
let S=loadS();if(!S.reminders)S.reminders={};
function save(){localStorage.setItem(STORE_KEY,JSON.stringify(S))}
function exportSync(){try{const encoded=btoa(unescape(encodeURIComponent(JSON.stringify(S))));const url=location.origin+location.pathname+'?d='+encoded;navigator.clipboard.writeText(url).then(()=>showToast('\ud83d\udd17 Link copied!','Open this URL on your phone or laptop to sync')).catch(()=>prompt('Copy this URL:',url));}catch(e){showToast('\u274c Error','Could not generate link')}}
function importSync(){const input=prompt('Paste the sync URL from your other device:');if(!input)return;try{let encoded=input.trim();if(encoded.includes('?d='))encoded=encoded.split('?d=')[1].split('&')[0];const parsed=JSON.parse(decodeURIComponent(escape(atob(encoded))));if(!parsed.tasks)throw new Error();S=parsed;if(!S.reminders)S.reminders={};save();render();showToast('\u2705 Synced!','All data imported successfully');}catch(e){showToast('\u274c Error','Invalid data')}}
function fmtH(h){return h.toString().padStart(2,'0')+':00'}
function isToday(d){const t=new Date();return d.getFullYear()===t.getFullYear()&&d.getMonth()===t.getMonth()&&d.getDate()===t.getDate()}
function dateKey(d){return d.toISOString().slice(0,10)}
function render(){const days=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];document.getElementById('date-label').textContent=days[cur.getDay()]+', '+months[cur.getMonth()]+' '+cur.getDate();renderCal();renderTasks();renderReminders();}
function renderCal(){const dk=dateKey(cur);const panel=document.getElementById('cal-panel');panel.innerHTML='';const now=new Date();for(let h=0;h<24;h++){const row=document.createElement('div');row.className='hour-row';const lbl=document.createElement('div');lbl.className='hour-label';lbl.textContent=fmtH(h);const cell=document.createElement('div');cell.className='hour-cell';cell.addEventListener('dragover',e=>{e.preventDefault();cell.classList.add('drag-over')});cell.addEventListener('dragleave',()=>cell.classList.remove('drag-over'));cell.addEventListener('drop',e=>{e.preventDefault();cell.classList.remove('drag-over');const tid=parseInt(e.dataTransfer.getData('text/plain'));if(!tid)return;const key=dk+'_'+h;if(!S.slots[key])S.slots[key]=[];if(S.slots[key].length>=MAX_PER_SLOT){showToast('Slot full','Max 10 tasks per hour');return;}if(!S.slots[key].includes(tid))S.slots[key].push(tid);save();renderCal();});(S.slots[dk+'_'+h]||[]).forEach(tid=>{const t=S.tasks.find(x=>x.id===tid);if(!t)return;const chip=document.createElement('div');chip.className='task-chip';chip.style.background=t.color;chip.title=t.name+' \u2014 click to remove';const sp=document.createElement('span');sp.textContent=t.name;chip.appendChild(sp);chip.onclick=e=>{e.stopPropagation();const key=dk+'_'+h;S.slots[key]=S.slots[key].filter(x=>x!==tid);if(!S.slots[key].length)delete S.slots[key];save();renderCal();};cell.appendChild(chip);});if(isToday(cur)&&now.getHours()===h){const pct=(now.getMinutes()/60)*100;const nl=document.createElement('div');nl.className='now-line';nl.style.top=pct+'%';cell.appendChild(nl);}row.appendChild(lbl);row.appendChild(cell);panel.appendChild(row);}panel.scrollTop=(isToday(cur)?Math.max(0,new Date().getHours()-1):7)*52;}
function renderTasks(){const list=document.getElementById('task-list');list.innerHTML='';S.tasks.forEach(t=>{const card=document.createElement('div');card.className='task-card';card.draggable=true;card.addEventListener('dragstart',e=>{e.dataTransfer.setData('text/plain',String(t.id));e.dataTransfer.effectAllowed='copy';setTimeout(()=>card.classList.add('dragging'),0);});card.addEventListener('dragend',()=>card.classList.remove('dragging'));const dot=document.createElement('div');dot.className='task-dot';dot.style.background=t.color;const name=document.createElement('div');name.className='task-name';name.textContent=t.name;const del=document.createElement('button');del.className='task-del';del.textContent='\u00d7';del.onclick=e=>{e.stopPropagation();S.tasks=S.tasks.filter(x=>x.id!==t.id);save();render()};card.appendChild(dot);card.appendChild(name);card.appendChild(del);list.appendChild(card);});}
function renderReminders(){const list=document.getElementById('rem-list');list.innerHTML='';REMINDER_TASKS.forEach(rt=>{const setHour=S.reminders[rt.id];const isSet=setHour!=null;const card=document.createElement('div');card.className='rem-card'+(isSet?' rem-set':'');const icon=document.createElement('span');icon.className='rem-icon';icon.textContent=isSet?'\ud83d\udd14':'\ud83d\udd15';const label=document.createElement('div');label.className='rem-label';label.textContent=rt.name;const timeEl=document.createElement('div');timeEl.className='rem-time';timeEl.textContent=isSet?fmtH(setHour):'--:--';card.appendChild(icon);card.appendChild(label);card.appendChild(timeEl);if(isSet){const clr=document.createElement('button');clr.className='rem-clear';clr.textContent='\u00d7';clr.onclick=e=>{e.stopPropagation();delete S.reminders[rt.id];save();renderReminders()};card.appendChild(clr);}card.onclick=()=>{const hv=prompt('Set reminder hour (0-23) for "'+rt.name+'":', isSet?setHour:'8');if(hv===null)return;const n=parseInt(hv);if(isNaN(n)||n<0||n>23){alert('Enter 0-23');return;}S.reminders[rt.id]=n;save();renderReminders();};list.appendChild(card);});}
function addTask(){const inp=document.getElementById('task-input');const name=inp.value.trim();if(!name)return;S.tasks.push({id:S.nextId++,name,color:COLORS[ci++%COLORS.length]});inp.value='';save();render();}
document.getElementById('add-btn').onclick=addTask;
document.getElementById('task-input').onkeydown=e=>{if(e.key==='Enter')addTask()};
document.getElementById('prev').onclick=()=>{cur=new Date(cur);cur.setDate(cur.getDate()-1);render()};
document.getElementById('next').onclick=()=>{cur=new Date(cur);cur.setDate(cur.getDate()+1);render()};
document.getElementById('today-btn').onclick=()=>{cur=new Date();cur.setHours(0,0,0,0);render()};
document.getElementById('export-btn').onclick=exportSync;
document.getElementById('import-btn').onclick=importSync;
let toastT;
function showToast(t,b){const el=document.getElementById('toast');document.getElementById('toast-title').textContent=t;document.getElementById('toast-body').textContent=b;el.style.display='block';clearTimeout(toastT);toastT=setTimeout(()=>el.style.display='none',5000);}
setInterval(()=>{if(isToday(cur))renderCal();},60000);
render();
</script>
</body>
</html>
